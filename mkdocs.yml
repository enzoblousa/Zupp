site_name: Zupp — Plataforma de Atendimento Jurídico
site_url: https://enzoblousa.github.io/Zupp/
site_description: Documentação do MVP da plataforma de atendimento jurídico sob demanda
docs_dir: docs

nav:
  - Início: index.md
  - Problema: problema.md
  - Proposta de Valor: proposta-de-valor.md
  - Usuários e Personas: personas.md
  - Escopo do MVP: escopo-mvp.md
  - Modelo de Monetização: monetizacao.md
  - Fora do Escopo: fora-do-escopo.md
  - Restrições Técnicas: restricoes.md
  - Considerações Regulatórias: regulatorio.md
  - Pontos Pendentes: pendencias.md
  - Próximos Passos: proximos-passos.md

theme:
  name: material
  language: pt
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.suggest
    - search.highlight
